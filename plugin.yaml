# Hermes plugin manifest (schema confirmed against NousResearch/hermes-agent:
# plugins/memory/*/plugin.yaml + hermes_cli/plugins_cmd.py). Fields: name,
# version, description, requires_env, hooks, pip_dependencies. There is NO
# `kind` field — a memory provider is recognised by living in a plugin dir whose
# __init__.py calls register_memory_provider (directory scan, not the manifest).
#
# `hermes plugins install` names the install dir from `name` below, so this lands
# at ~/.hermes/plugins/librarian/ regardless of the repo name.
name: librarian
version: 0.2.0
description: Memory Provider backed by The Librarian — recall/remember/verify plus four user-facing verbs (/handoff /takeover /learn /toggle-private) and per-turn conv-state injection.
# kind: standalone is REQUIRED here even though we're a memory provider. Without
# it, Hermes auto-coerces any user-installed plugin whose __init__.py mentions
# `register_memory_provider`/`MemoryProvider` to kind: "exclusive"
# (hermes_cli/plugins.py:1272-1290), and then the general PluginManager skips
# exclusive plugins entirely — so the pre_gateway_dispatch gate and the
# /lib-session-* slash commands never register. The auto-coerce protects naive
# memory-only plugins from a PluginContext that has no register_memory_provider;
# we sidestep it by declaring kind explicitly. register() in __init__.py guards
# every registration, so each loader (memory + general) wires what its context
# supports.
kind: standalone
# requires_env drives the install-time secret prompt. The endpoint is collected
# by `hermes memory setup` (get_config_schema), not here.
requires_env:
  - LIBRARIAN_AGENT_TOKEN
# Hook registered when enabled as a general plugin (`hermes plugins enable librarian`).
hooks:
  - pre_gateway_dispatch
